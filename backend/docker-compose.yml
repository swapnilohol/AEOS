version: "3.9"

services:

  backend:
    build: .
    container_name: aeos_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: aeos_postgres
    environment:
      POSTGRES_DB: aeos_db
      POSTGRES_USER: aeos_user
      POSTGRES_PASSWORD: aeos_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aeos_redis
    ports:
      - "6380:6379"

volumes:
  postgres_data:
