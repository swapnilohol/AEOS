services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  executor:
    build:
      context: ./apps/executor
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    # NOTE: sandboxed code execution runs here.
    # No published ports; no external network access by design.
    # The Docker socket is mounted so this service can launch ephemeral,
    # network-isolated sandbox containers for untrusted student code
    # ("Docker outside of Docker"). This gives the executor container
    # effectively host-level Docker control — see docs/README.md for the
    # security trade-off and hardening notes.

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      # Mounts the specific file (not the whole directory) so the
      # Deployment Module's docker-compose.production.yml can add its own
      # nginx config to this same container without a path collision.
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
